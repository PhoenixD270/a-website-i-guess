<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~✦ my corner of the internet ✦~</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky-top: #0a0a1a;
      --sky-mid: #0d1b3e;
      --sky-low: #1a2a5e;
      --horizon: #2e1760;
      --moon: #f5e6c8;
      --cloud: rgba(200,210,255,0.12);
      --star: #e8e0ff;
      --accent: #b48eff;
      --accent2: #ff8ef0;
      --text: #d4caff;
      --dim: #6a5f9e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-low) 75%, var(--horizon) 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
    }

    /* ── STARS ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--star);
      animation: twinkle var(--dur) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* ── MOON ── */
    .moon {
      position: fixed;
      top: 7vh;
      right: 12vw;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #fff8e8, var(--moon) 60%, #c8b87a);
      box-shadow: 0 0 40px 12px rgba(245,230,200,0.18), 0 0 90px 30px rgba(245,230,200,0.07);
      z-index: 1;
    }

    /* ── CLOUDS ── */
    .cloud {
      position: fixed;
      border-radius: 50px;
      background: var(--cloud);
      filter: blur(18px);
      z-index: 1;
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to   { transform: translateX(-110vw); }
    }

    /* ── FLYING CAT ── */
    .cat-wrap {
      position: fixed;
      z-index: 10;
      animation: fly 18s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      filter: drop-shadow(0 0 18px rgba(180,142,255,0.7)) drop-shadow(0 0 40px rgba(255,142,240,0.3));
    }
    @keyframes fly {
      0%   { left: -120px; top: 30vh; transform: rotate(-4deg) scaleX(1); }
      10%  { top: 26vh; transform: rotate(3deg) scaleX(1); }
      20%  { top: 32vh; transform: rotate(-2deg) scaleX(1); }
      30%  { top: 22vh; transform: rotate(4deg) scaleX(1); }
      40%  { top: 28vh; transform: rotate(-3deg) scaleX(1); }
      50%  { left: 50vw; top: 25vh; transform: rotate(2deg) scaleX(1); }
      60%  { top: 30vh; transform: rotate(-4deg) scaleX(1); }
      70%  { top: 20vh; transform: rotate(3deg) scaleX(1); }
      80%  { top: 28vh; transform: rotate(-2deg) scaleX(1); }
      90%  { top: 24vh; transform: rotate(4deg) scaleX(1); }
      100% { left: 110vw; top: 30vh; transform: rotate(-2deg) scaleX(1); }
    }

    .cat-emoji {
      font-size: 68px;
      line-height: 1;
      display: block;
      animation: flap 0.35s ease-in-out infinite alternate;
      user-select: none;
    }
    @keyframes flap {
      from { transform: scaleY(1) translateY(0px); }
      to   { transform: scaleY(0.88) translateY(-6px); }
    }

    /* wing sparkle trail */
    .sparkle-trail {
      position: absolute;
      top: 50%;
      left: -10px;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
      pointer-events: none;
    }
    .sp {
      font-size: 14px;
      animation: fadetrail 0.6s ease-out forwards;
      opacity: 0;
    }
    .sp:nth-child(1) { animation-delay: 0s; font-size: 18px; }
    .sp:nth-child(2) { animation-delay: 0.1s; }
    .sp:nth-child(3) { animation-delay: 0.2s; font-size: 10px; }
    .sp:nth-child(4) { animation-delay: 0.3s; }
    @keyframes fadetrail {
      0%   { opacity: 0.9; transform: translateY(-50%) scale(1); }
      100% { opacity: 0; transform: translateY(calc(-50% - 20px)) scale(0.4); }
    }

    /* ── CONTENT ── */
    .content {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 48px;
    }

    .hero {
      text-align: center;
    }

    .hero-label {
      font-family: 'Pixelify Sans', monospace;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Pixelify Sans', monospace;
      font-size: clamp(42px, 9vw, 90px);
      font-weight: 700;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 0 30px rgba(180,142,255,0.6), 0 0 80px rgba(180,142,255,0.2);
      letter-spacing: -1px;
    }

    .hero-title .accent { color: var(--accent2); }

    .hero-sub {
      margin-top: 16px;
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* cards */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 780px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,142,255,0.15);
      border-radius: 16px;
      padding: 28px 32px;
      min-width: 200px;
      flex: 1;
      max-width: 220px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      backdrop-filter: blur(8px);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: rgba(180,142,255,0.5);
      background: rgba(180,142,255,0.08);
    }

    .card-icon { font-size: 32px; }
    .card-title {
      font-family: 'Pixelify Sans', monospace;
      font-size: 15px;
      color: #fff;
      font-weight: 700;
    }
    .card-desc {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.6;
    }

    /* footer */
    .footer {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      text-align: center;
      padding-bottom: 12px;
    }
    .footer span { color: var(--accent2); }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Moon -->
  <div class="moon"></div>

  <!-- Clouds -->
  <div class="cloud" style="width:320px;height:70px;top:18vh;left:20vw;animation-duration:55s;opacity:0.6;"></div>
  <div class="cloud" style="width:180px;height:45px;top:42vh;left:70vw;animation-duration:75s;animation-delay:-30s;opacity:0.4;"></div>
  <div class="cloud" style="width:260px;height:55px;top:60vh;left:10vw;animation-duration:65s;animation-delay:-20s;opacity:0.35;"></div>
  <div class="cloud" style="width:140px;height:35px;top:12vh;left:55vw;animation-duration:85s;animation-delay:-45s;opacity:0.3;"></div>

  <!-- Flying Cat 🐱🪽 -->
  <div class="cat-wrap" id="catWrap">
    <div class="sparkle-trail">
      <span class="sp" id="sp1">✨</span>
      <span class="sp" id="sp2">⭐</span>
      <span class="sp" id="sp3">✦</span>
      <span class="sp" id="sp4">✨</span>
    </div>
    <span class="cat-emoji">🐱🪽</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="hero">
      <p class="hero-label">✦ welcome traveller ✦</p>
      <h1 class="hero-title">my <span class="accent">github</span><br/>profile</h1>
      <p class="hero-sub">// things i've built & experiments i've run</p>
    </div>

    <div class="cards">
      <a class="card" href="https://github.com?tab=repositories">
        <span class="card-icon">📦</span>
        <span class="card-title">repos</span>
        <span class="card-desc">all my public projects and source code</span>
      </a>
      <a class="card" href="https://github.com?tab=stars">
        <span class="card-icon">⭐</span>
        <span class="card-title">stars</span>
        <span class="card-desc">things i found cool and bookmarked</span>
      </a>
      <a class="card" href="https://github.com?tab=followers">
        <span class="card-icon">🌐</span>
        <span class="card-title">connect</span>
        <span class="card-desc">follow along or drop me a message</span>
      </a>
    </div>

    <p class="footer">made with <span>♥</span> &amp; a flying cat</p>
  </div>

  <script>
    // Generate stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 160; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      const dur = (Math.random() * 4 + 2).toFixed(1);
      const minOp = (Math.random() * 0.3 + 0.1).toFixed(2);
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}vh; left:${Math.random()*100}vw;
        --dur:${dur}s; --min-op:${minOp};
        animation-delay:${(Math.random()*5).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }

    // Re-trigger sparkle trail on each loop
    const sparkles = document.querySelectorAll('.sp');
    function resetSparkles() {
      sparkles.forEach(sp => {
        sp.style.animation = 'none';
        void sp.offsetWidth;
        sp.style.animation = '';
      });
    }
    setInterval(resetSparkles, 700);
  </script>
</body>
    </html>
