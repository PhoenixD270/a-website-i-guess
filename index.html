<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0f7 50%, #d4f1ff 100%);
    }

    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.8;
      filter: blur(6px);
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-400px); }
    }

    .cat {
      position: absolute;
      font-size: 72px;
      animation: float 18s linear infinite, bob 3s ease-in-out infinite;
      user-select: none;
    }
    @keyframes float {
      from { left: -100px; }
      to   { left: 110vw; }
    }
    @keyframes bob {
      0%, 100% { margin-top: 0; }
      50%       { margin-top: -30px; }
    }
  </style>
</head>
<body>

  <div class="cloud" style="width:220px;height:60px;top:15%;animation-duration:40s;animation-delay:0s;"></div>
  <div class="cloud" style="width:160px;height:45px;top:30%;animation-duration:55s;animation-delay:-15s;"></div>
  <div class="cloud" style="width:300px;height:70px;top:55%;animation-duration:48s;animation-delay:-28s;"></div>
  <div class="cloud" style="width:130px;height:40px;top:70%;animation-duration:62s;animation-delay:-40s;"></div>

  <div class="cat" style="top:35%;">🐱</div>

</body>
</html>
